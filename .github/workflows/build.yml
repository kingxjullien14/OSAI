name: build

# Builds the desktop app on Windows + macOS. On a plain push it just compiles
# and uploads the installers as run artifacts (our "Windows compiler" for the
# port). On a `v*` tag it also publishes a GitHub Release.
on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
    runs-on: ${{ matrix.platform }}
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend deps
        run: pnpm install --frozen-lockfile

      - name: use ad-hoc mac signing in ci
        if: runner.os == 'macOS'
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.bundle.macOS.signingIdentity='-';fs.writeFileSync(p,JSON.stringify(c,null,2));"

      - name: build (tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # only cut a Release on a tag push; plain pushes just build
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && 'AIOS __VERSION__' || '' }}
          releaseDraft: true

      - name: upload installers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aios-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg
