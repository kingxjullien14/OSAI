name: build

# Builds the desktop app on Windows + macOS. On a plain push it just compiles
# and uploads the installers as run artifacts (our "Windows compiler" for the
# port). On a `v*` tag it also publishes a GitHub Release.
on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

# tauri-action creates a GitHub Release on a v* tag; the default read-only
# GITHUB_TOKEN can't ("Resource not accessible by integration"), so grant write.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
    runs-on: ${{ matrix.platform }}
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v7
        with:
          # full history + annotated tags so the "release notes from tag" step
          # below can read the tag's message body (a shallow clone omits it).
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          # Node 20 hit EOL (Apr 2026); build on the current LTS. This is the
          # BUILD toolchain node, separate from the actions' own runtime.
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend deps
        run: pnpm install --frozen-lockfile

      - name: use ad-hoc mac signing in ci
        if: runner.os == 'macOS'
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.bundle.macOS.signingIdentity='-';fs.writeFileSync(p,JSON.stringify(c,null,2));"

      # Release notes for BOTH the GitHub release body AND the in-app updater
      # (latest.json → `notes`, shown in Settings › about › software update) come
      # from the ANNOTATED TAG's message body — so annotate the release tag with
      # the changelog (`git tag -a vX.Y.Z -F notes.md`; see RELEASING.md).
      # tauri-action bakes releaseBody into latest.json at build time, which is why
      # this must exist BEFORE the build (setting the release body afterwards would
      # not reach the manifest).
      - name: release notes from tag
        id: notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          body="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents:body)')"
          # lightweight tag / empty body → fall back to the tag's subject line
          if [ -z "${body//[[:space:]]/}" ]; then
            body="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents:subject)')"
          fi
          {
            echo "body<<__OSAI_NOTES_EOF__"
            echo "$body"
            echo "__OSAI_NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: build (tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing: createUpdaterArtifacts requires the private key or
          # the build fails ("A public key has been found, but no private key").
          # The secret holds the CONTENT of ~/.osai/keys/osai-updater.key (see
          # RELEASING.md). The key is passwordless — the explicitly-empty
          # password env skips the interactive prompt that would hang CI.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          # only cut a Release on a tag push; plain pushes just build
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && 'OSAI __VERSION__' || '' }}
          # changelog from the annotated tag → the GitHub release body AND,
          # crucially, latest.json's `notes` (the in-app "software update" panel).
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true

      - name: upload installers
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: osai-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg
