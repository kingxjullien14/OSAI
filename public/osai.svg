  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14.5" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="13.5" fill="none" stroke="#a78bfa" stroke-opacity="0.28" stroke-width="1"/>
  <g transform="rotate(45 32 32)">
    <rect x="17.5" y="17.5" width="29" height="29" rx="6" fill="url(#d)" opacity="0.28"/>
